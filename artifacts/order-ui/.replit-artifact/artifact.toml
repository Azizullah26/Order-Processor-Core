kind = "web"
previewPath = "/"
title = "Order Processing UI"
version = "1.0.0"
id = "artifacts/order-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23331

[services.development]
run = "pnpm --filter @workspace/order-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/order-ui", "run", "build" ]
publicDir = "artifacts/order-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23331"
BASE_PATH = "/"
